spring.application.name=sams-backend

server.port=${PORT:8080}

spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/sams}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.security.jwt.secret=${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
app.security.jwt.access-token-expiration-minutes=${APP_JWT_ACCESS_EXP_MINUTES:30}
app.security.jwt.refresh-token-expiration-days=${APP_JWT_REFRESH_EXP_DAYS:14}
app.attendance.default-expiry-minutes=${APP_ATTENDANCE_EXPIRY_MINUTES:5}
app.attendance.default-radius-meters=${APP_ATTENDANCE_RADIUS_METERS:100}
app.file.upload-dir=${APP_UPLOAD_DIR:uploads}

springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html
